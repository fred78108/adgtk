<div class="flex flex-col h-full">

  <div class="px-6 py-5 border-b border-slate-200">
    <h2 class="text-base font-semibold text-slate-900">New Experiment</h2>
    <p class="text-sm text-slate-500 mt-0.5">Choose a scenario to configure</p>
  </div>

  {% if scenarios %}
  <div class="flex-1 overflow-y-auto px-6 py-4 space-y-2">
    {% for s in scenarios %}
    <form hx-post="/experiments/builder/start"
          hx-target="#builder-content"
          hx-swap="innerHTML">
      <input type="hidden" name="scenario_factory_id" value="{{ s.factory_id }}">
      <button type="submit"
              class="w-full text-left rounded-lg border border-slate-200 px-4 py-3
                     hover:border-indigo-400 hover:bg-indigo-50 transition-colors group">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <div class="font-mono text-sm font-medium text-slate-900 group-hover:text-indigo-700">
              {{ s.factory_id }}
            </div>
            <div class="text-sm text-slate-500 mt-0.5 truncate">{{ s.summary }}</div>
          </div>
          {% if s.tags %}
          <div class="flex flex-wrap gap-1 flex-shrink-0 mt-0.5">
            {% for tag in s.tags %}
            <span class="inline-block rounded px-1.5 py-0.5 text-xs bg-slate-100 text-slate-500">
              {{ tag }}
            </span>
            {% endfor %}
          </div>
          {% endif %}
        </div>
      </button>
    </form>
    {% endfor %}
  </div>
  {% else %}
  <div class="flex-1 flex items-center justify-center px-6 py-12 text-center">
    <div>
      <p class="text-sm text-slate-500">No scenarios registered.</p>
      <p class="text-xs text-slate-400 mt-1">
        Add scenarios in <code class="font-mono">bootstrap.py</code>.
      </p>
    </div>
  </div>
  {% endif %}

</div>
