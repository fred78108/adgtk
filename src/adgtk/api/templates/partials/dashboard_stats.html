{% set stats = [
  ('Blueprints', experiment_count),
  ('Recent runs', recent_run_count),
] %}
{% for label, val in stats %}
<div class="bg-white rounded-lg border border-slate-200 shadow-sm px-5 py-4">
  <p class="text-xs font-medium text-slate-500 uppercase tracking-wide">{{ label }}</p>
  <p class="mt-1 text-3xl font-bold text-slate-900">{{ val }}</p>
</div>
{% endfor %}
