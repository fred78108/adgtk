site_name: ADGTK
site_url: https://fred78108.github.io/adgtk
site_description: Agentic Data Generation Toolkit — a Python framework for researching and validating agentic systems.
site_author: Fred Diehl
repo_name: fred78108/adgtk
repo_url: https://github.com/fred78108/adgtk
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - User Guide:
    - Creating Scenarios: user-guide/creating-scenarios.md
    - Building Experiments: user-guide/building-experiments.md
    - Tracking & Results: tracking-results.md
    - Studies: user-guide/studies.md
  - CLI Reference: cli-reference.md
  - Advanced:
    - Batch Jobs: advanced/batch-jobs.md
    - Agent Writer: advanced/agent-writer.md
    - Custom Measurements: advanced/custom-measurements.md
    - Bootstrap Configuration: advanced/bootstrap.md
  - API Reference:
    - Factory: api/factory.md
    - Experiment: api/experiment.md
    - Tracking: api/tracking.md
    - Measurements: api/measurements.md
    - Data: api/data.md
